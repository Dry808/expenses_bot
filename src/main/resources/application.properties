spring.application.name=expense-tracker-bot

# ── DataSource ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ── Telegram Bot ──────────────────────────────────────────────
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS для Mini App ─────────────────────────────────────────
spring.mvc.cors.allowed-origins=https://talented-elegance-production-202c.up.railway.app,https://web.telegram.org,https://*.telegram.org
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=false

# ── Logging ───────────────────────────────────────────────────
logging.level.com.expensebot=INFO
logging.level.com.expensebot.service.TelegramAuthService=DEBUG
logging.level.com.expensebot.controller.MiniAppController=DEBUG
logging.level.org.telegram=WARN
logging.level.liquibase=WARN
