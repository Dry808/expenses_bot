spring.application.name=expense-tracker-bot

# ── DataSource ────────────────────────────────────────────────
# URL управляется бином DatabaseConfig (конвертирует Railway postgres:// в JDBC)
# Для локальной разработки задайте DATABASE_URL=jdbc:postgresql://localhost:5432/expense_tracker

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Liquibase ─────────────────────────────────────────────────
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ── Telegram Bot ──────────────────────────────────────────────
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# ── Server ────────────────────────────────────────────────────
# Railway автоматически выставляет переменную PORT
server.port=${PORT:8080}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.expensebot=INFO
logging.level.org.telegram=WARN
logging.level.liquibase=WARN
